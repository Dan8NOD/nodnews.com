<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gadget Designer — NODNEWS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px;max-width:700px;margin:0 auto}
h1{font-size:24px;margin-bottom:4px;color:#d4a853}
.sub{color:#94a3b8;font-size:13px;margin-bottom:20px}
.sub a{color:#94a3b8;text-decoration:none;border-bottom:1px solid #2d3f52}
h2{font-size:15px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid #2d3f52;text-transform:uppercase;letter-spacing:1px}
h2:first-of-type{margin-top:0}
.task{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:6px;transition:background .15s}
.task:hover{background:#243042}
.task input[type=checkbox]{margin-top:3px;width:16px;height:16px;accent-color:#d4a853;cursor:pointer;flex-shrink:0}
.task label{cursor:pointer;line-height:1.5;font-size:14px;flex:1}
.checked label{text-decoration:line-through;color:#64748b}
.checked .time{color:#475569}
.time{font-size:11px;color:#64748b;flex-shrink:0;margin-top:2px}
.actions{text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid #2d3f52}
.actions button{background:0;border:1px solid #2d3f52;color:#94a3b8;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.actions button:hover{background:#243042;color:#e2e8f0}
.day-count{color:#94a3b8;font-size:13px;margin-bottom:8px}
</style>
</head>
<body>
<h1>NODNEWS</h1>
<p class="sub"><a href="https://negotiatorsondemand.com">negotiatorsondemand.com</a></p>
<div class="day-section">
  <h2 style="color:#d4a853;text-transform:uppercase;letter-spacing:1px;font-size:15px;margin-bottom:4px">Today &mdash; Tuesday, July 07</h2>
  <div id="app-today"></div>
</div>
<div style="height:1px;background:#2d3f52;margin:32px 0"></div>
<div class="day-section">
  <h2 style="color:#d4a853;text-transform:uppercase;letter-spacing:1px;font-size:15px;margin-bottom:4px">Tomorrow &mdash; Wednesday, July 08</h2>
  <div id="app-tomorrow"></div>
</div>
<div class="actions"><button onclick="clearDone()">Clear checked</button></div>
<script>
const KEY = "nod_todo";
let state;
try{state=JSON.parse(localStorage.getItem(KEY)||"[]")}catch(e){state=[]}

function render(){
  document.querySelectorAll(".task").forEach(el=>{
    const cb = el.querySelector("input");
    if(!cb) return;
    const s = state.find(s=>s.text===cb.dataset.key);
    if(s){ cb.checked = s.done; if(s.done) el.classList.add("checked") }
    else state.push({text:cb.dataset.key,done:false});
    cb.addEventListener("change", function(){
      const s = state.find(s=>s.text===this.dataset.key);
      if(s){ s.done = this.checked; if(this.checked) el.classList.add("checked"); else el.classList.remove("checked") }
      localStorage.setItem(KEY,JSON.stringify(state));
    });
  });
}

function clearDone(){
  state.forEach(s=>s.done=false);
  localStorage.setItem(KEY,JSON.stringify(state));
  location.reload();
}
render();
</script>
</body>
</html>
